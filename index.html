<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ARCH_CORE_RESONANCE_VISUALIZER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@100;300;500;700&display=swap');

        :root {
            --bg: #050505;
            --panel-bg: #0d0d0d;
            --border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-dim: #888888;
            --font-sys: 'Orbitron', 'Noto Sans KR', sans-serif;
        }

        * { box-sizing: border-box; outline: none; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #555; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: var(--font-sys);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- 배경 효과 --- */
        .scanline {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0) 50%, rgba(255, 255, 255, 0.02) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 9000;
        }

        /* --- 헤더 --- */
        header {
            padding: 20px 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10;
        }
        .header-title { font-size: 20px; font-weight: 900; letter-spacing: 4px; }
        .header-sub { font-size: 10px; color: var(--text-dim); letter-spacing: 2px; }

        /* --- 메인 레이아웃 --- */
        #main-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 70px);
        }

        /* --- 캔버스 디스플레이 영역 --- */
        #display-area {
            flex: 1;
            position: relative;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI 오버레이 정보 */
        .overlay-info {
            position: absolute;
            top: 20px;
            left: 30px;
            pointer-events: none;
        }
        .info-label { font-size: 10px; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 5px; }
        .info-value { font-size: 24px; font-weight: 900; font-family: monospace; letter-spacing: 2px; }

        /* --- 제어 패널 --- */
        #control-panel {
            width: 350px;
            background: var(--panel-bg);
            border-left: 1px solid var(--border);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 10;
            box-shadow: -10px 0 30px rgba(0,0,0,0.8);
            overflow-y: auto;
        }

        .panel-title {
            font-size: 14px;
            font-weight: 900;
            color: var(--text-main);
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .control-group { display: flex; flex-direction: column; gap: 8px; }
        .control-header { display: flex; justify-content: space-between; align-items: flex-end; }
        .control-label { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; }
        .control-val-display { font-size: 12px; font-family: monospace; color: #fff; }

        /* 슬라이더 스타일 */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 8px;
            border-radius: 2px;
            background: #fff;
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #333;
            border-radius: 2px;
        }
        input[type=range]:focus { outline: none; }

        /* 색상 선택기 스타일 */
        .color-picker-wrapper { display: flex; gap: 15px; }
        .color-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 100%;
            height: 40px;
            border-radius: 4px;
            cursor: pointer;
            background: transparent;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid #555; border-radius: 4px; }

        .preset-btn {
            background: transparent; border: 1px solid #555; color: #fff;
            padding: 10px; font-family: var(--font-sys); font-size: 11px; cursor: pointer;
            transition: 0.3s; letter-spacing: 1px; margin-top: 10px;
        }
        .preset-btn:hover { background: #fff; color: #000; }
    </style>
</head>
<body>

<div class="scanline"></div>

<header>
    <div>
        <div class="header-title">ARCH_SYSTEM</div>
        <div class="header-sub">CORE RESONANCE WAVEFORM VISUALIZER V1.0</div>
    </div>
    <div style="text-align: right;">
        <div class="header-sub">STATUS</div>
        <div style="font-weight: 900; color: #00ffcc; text-shadow: 0 0 10px #00ffcc;">ACTIVE</div>
    </div>
</header>

<div id="main-container">
    <div id="display-area">
        <canvas id="coreCanvas"></canvas>
        <div class="overlay-info">
            <div class="info-label">CURRENT_SYNC_RATE</div>
            <div class="info-value" id="display-sync">85.0%</div>
        </div>
    </div>

    <div id="control-panel">
        <div class="panel-title">PARAMETER_CONTROL</div>

        <div class="control-group">
            <div class="control-header">
                <span class="control-label">ENERGY AMPLITUDE (출력 강도)</span>
                <span class="control-val-display" id="val-amp">100%</span>
            </div>
            <input type="range" id="param-amp" min="10" max="200" value="100">
        </div>

        <div class="control-group">
            <div class="control-header">
                <span class="control-label">RESONANCE FREQUENCY (공명 주파수)</span>
                <span class="control-val-display" id="val-freq">5.0 Hz</span>
            </div>
            <input type="range" id="param-freq" min="1" max="150" value="50">
        </div>

        <div class="control-group">
            <div class="control-header">
                <span class="control-label">PARTICLE OUTPUT (입자 배출량)</span>
                <span class="control-val-display" id="val-part">HIGH</span>
            </div>
            <input type="range" id="param-part" min="0" max="300" value="150">
        </div>

        <div class="panel-title" style="margin-top: 15px;">CORE_SIGNATURE_COLOR</div>
        
        <div class="color-picker-wrapper">
            <div class="color-box">
                <span class="control-label">WAVE_COLOR_1</span>
                <input type="color" id="color1" value="#ff3300"> 
            </div>
            <div class="color-box">
                <span class="control-label">WAVE_COLOR_2</span>
                <input type="color" id="color2" value="#ffea00">
            </div>
        </div>

        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 8px;">
            <div class="control-label" style="text-align: center;">--- QUICK PRESETS ---</div>
            <button class="preset-btn" onclick="applyPreset('#3388FF', '#00FFFF', 80, 40, 200)">💧 AQUA (STABLE)</button>
            <button class="preset-btn" onclick="applyPreset('#FFD700', '#FFFFFF', 150, 120, 250)">⚡ FULMEN (HIGH FREQ)</button>
            <button class="preset-btn" onclick="applyPreset('#FF0000', '#550000', 180, 20, 300)">⚠️ RAMPAGE (DANGER)</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('coreCanvas');
    const ctx = canvas.getContext('2d');

    // UI 요소
    const elAmp = document.getElementById('param-amp');
    const elFreq = document.getElementById('param-freq');
    const elPart = document.getElementById('param-part');
    const elCol1 = document.getElementById('color1');
    const elCol2 = document.getElementById('color2');

    const valAmp = document.getElementById('val-amp');
    const valFreq = document.getElementById('val-freq');
    const valPart = document.getElementById('val-part');
    const displaySync = document.getElementById('display-sync');

    // 캔버스 크기 맞춤
    function resize() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // 애니메이션 변수
    let time = 0;
    let particles = [];

    // 파티클 객체 생성 함수
    class Particle {
        constructor(x, y, color1, color2) {
            this.x = x;
            this.y = y;
            this.size = Math.random() * 3 + 1;
            this.speedX = (Math.random() - 0.5) * 2;
            this.speedY = (Math.random() - 1) * 3 - 1; // 주로 위로 퍼지게
            this.life = 1.0;
            this.decay = Math.random() * 0.02 + 0.01;
            this.color = Math.random() > 0.5 ? color1 : color2; // 두 색상 중 하나 랜덤
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.life -= this.decay;
        }
        draw(ctx) {
            ctx.globalAlpha = Math.max(0, this.life);
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1.0;
            ctx.shadowBlur = 0;
        }
    }

    function hexToRgb(hex) {
        let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : null;
    }

    // 메인 드로우 루프
    function animate() {
        requestAnimationFrame(animate);

        // 잔상 효과를 위한 반투명 배경 칠하기
        ctx.fillStyle = 'rgba(10, 10, 10, 0.15)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 값 읽어오기
        const amplitude = parseFloat(elAmp.value);
        const frequency = parseFloat(elFreq.value) * 0.0005; // 캔버스 너비에 맞게 스케일링
        const particleLimit = parseInt(elPart.value);
        const c1 = elCol1.value;
        const c2 = elCol2.value;
        
        const centerY = canvas.height / 2;

        // UI 텍스트 업데이트
        valAmp.innerText = `${amplitude}%`;
        valFreq.innerText = `${(parseFloat(elFreq.value) / 10).toFixed(1)} Hz`;
        valPart.innerText = particleLimit;
        
        // 동기화율 텍스트 기믹 (주파수와 진폭이 높을수록 불안정)
        let syncRate = 100 - (amplitude/4) - (parseFloat(elFreq.value)/5) + (Math.random()*2);
        if(syncRate > 99) syncRate = 99.9;
        if(syncRate < 0) syncRate = 0.0;
        displaySync.innerText = `${syncRate.toFixed(1)}%`;
        displaySync.style.color = syncRate < 40 ? '#ff0000' : '#fff';

        // 선형 그라데이션 생성 (왼쪽에서 오른쪽으로)
        const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
        gradient.addColorStop(0, c1);
        gradient.addColorStop(1, c2);

        // --- 3중 파형 그리기 (입체감 부여) ---
        const waves = [
            { ampMult: 1.0, freqMult: 1.0, speed: 0.02, width: 4, alpha: 1.0 },
            { ampMult: 0.6, freqMult: 1.5, speed: 0.03, width: 2, alpha: 0.6 },
            { ampMult: 1.2, freqMult: 0.8, speed: 0.015, width: 1, alpha: 0.4 }
        ];

        waves.forEach(w => {
            ctx.beginPath();
            ctx.lineWidth = w.width;
            ctx.strokeStyle = gradient;
            ctx.globalAlpha = w.alpha;
            
            // 네온 글로우 효과
            ctx.shadowBlur = 15 * w.alpha;
            ctx.shadowColor = c1;

            for (let x = 0; x < canvas.width; x += 5) {
                // 싸인파 수학 공식: y = A * sin(B * x + C)
                // 중앙으로 갈수록 파장이 커지는 효과 부여 (Envelope)
                let envelope = Math.sin((x / canvas.width) * Math.PI); 
                let y = centerY + Math.sin(x * frequency * w.freqMult + time * (w.speed * 100)) * amplitude * w.ampMult * envelope;
                
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);

                // 파티클 생성 로직 (현재 위치의 파형 위에서 랜덤 발생)
                if (Math.random() < (particleLimit / 10000) && w.ampMult === 1.0) {
                    particles.push(new Particle(x, y, c1, c2));
                }
            }
            ctx.stroke();
        });

        // 글로벌 알파 및 섀도우 초기화
        ctx.globalAlpha = 1.0;
        ctx.shadowBlur = 0;

        // --- 파티클 업데이트 및 그리기 ---
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            particles[i].draw(ctx);
            if (particles[i].life <= 0) {
                particles.splice(i, 1);
            }
        }

        // 파티클 개수 제한 유지
        if (particles.length > particleLimit * 2) {
            particles.splice(0, particles.length - particleLimit * 2);
        }

        time += 0.05; // 전체 시간 흐름
    }

    // 프리셋 적용 함수
    function applyPreset(c1, c2, amp, freq, part) {
        elCol1.value = c1;
        elCol2.value = c2;
        elAmp.value = amp;
        elFreq.value = freq;
        elPart.value = part;
    }

    // 애니메이션 시작
    animate();
</script>
</body>
</html>
